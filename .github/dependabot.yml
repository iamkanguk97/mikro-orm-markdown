version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
      time: '09:00'
      timezone: 'Asia/Seoul'
    open-pull-requests-limit: 5
    groups:
      mikro-orm:
        patterns:
          - '@mikro-orm/*'
      typescript-tooling:
        patterns:
          - 'typescript'
          - 'tsup'
          - 'tsx'
          - '@typescript-eslint/*'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
      production-dependencies:
        dependency-type: 'production'
        patterns:
          - '*'
      development-dependencies:
        dependency-type: 'development'
        patterns:
          - '*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'
      time: '09:00'
      timezone: 'Asia/Seoul'
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - '*'
