name: Bug Report
description: Report a bug in mikro-orm-markdown
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Set up entity with...
        2. Run `mikro-orm-markdown --config ...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Minimal Reproduction
      description: Entity code and/or MikroORM config that reproduces the issue.
      render: typescript

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: "e.g. 20.x"
    validations:
      required: true

  - type: input
    id: mikro-orm-version
    attributes:
      label: "@mikro-orm/core Version"
      placeholder: "e.g. 6.3.0"
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: mikro-orm-markdown Version
      placeholder: "e.g. 0.1.0-alpha.1"
    validations:
      required: true
